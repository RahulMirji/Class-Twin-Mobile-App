name: class_twin
description: "Class Twin — Intelligent Digital Twin for Hybrid Classrooms"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  
  # Streaming
  livekit_client: ^2.4.3
  
  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  phosphor_flutter: ^2.1.0
  
  # Utilities
  uuid: ^4.5.1
  connectivity_plus: ^6.1.4
  intl: ^0.19.0
  
  # Error Tracking & Monitoring
  sentry_flutter: any
  battery_plus: ^6.1.1
  
  # QR Scanner
  mobile_scanner: ^5.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  
  # Camera (engagement tracking)
  camera: ^0.11.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B0E14"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#0B0E14"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
